<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billa Quantum Lab - Fixed Motion</title>
    <style>
        :root { --bg: #020205; --accent: #00f2ff; --danger: #ff007b; --gold: #ffcc00; --border: rgba(0, 242, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Layar Awal */
        #start-screen { position: fixed; inset: 0; background: #020205; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .btn-start { padding: 15px 40px; font-size: 1rem; color: var(--accent); background: none; border: 2px solid var(--accent); border-radius: 50px; cursor: pointer; font-weight: bold; }

        nav { display: flex; justify-content: center; gap: 10px; padding: 15px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #888; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,242,255,0.1); }

        .main-content { flex: 1; display: flex; flex-direction: column; }
        .canvas-area { flex: 1; position: relative; background: #000; overflow: hidden; }
        .sidebar { padding: 20px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--border); }

        @media (min-width: 768px) { .main-content { flex-direction: row; } .sidebar { width: 320px; border-top: none; border-right: 1px solid var(--border); } }

        canvas { position: absolute; width: 100%; height: 100%; }
        .handle { position: absolute; width: 50px; height: 50px; border: 3px solid white; border-radius: 50%; background: rgba(0,242,255,0.4); z-index: 100; touch-action: none; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .energy-line { position: absolute; width: 100%; height: 2px; box-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color:var(--accent); margin-bottom: 20px; letter-spacing: 3px;">QUANTUM CORE</h1>
    <button class="btn-start" onclick="startApp()">ACTIVATE INTERFACE</button>
</div>

<nav>
    <button class="tab-btn active" onclick="setTab('kinetic', this)">KINETIC</button>
    <button class="tab-btn" onclick="setTab('wave', this)">WAVE MOTION</button>
</nav>

<div class="main-content">
    <div class="sidebar">
        <h2 id="title" style="color:var(--accent)">KINETIC</h2>
        <div id="wave-ui" style="display:none; margin-top:20px;">
            <p style="font-size:0.8rem; margin-bottom:10px;">SUPERPOSITION MIXING</p>
            <input type="range" id="mix" style="width:100%;" value="50">
        </div>
        <div style="margin-top:30px; padding:15px; background:rgba(255,255,255,0.03); border-radius:10px; font-family:monospace;">
            STAT_A: <span id="val-a" style="color:var(--gold)">13.60</span><br>
            STAT_B: <span id="val-b" style="color:var(--gold)">13.60</span>
        </div>
    </div>

    <div class="canvas-area" id="stage">
        <canvas id="c"></canvas>
        <div id="kinetic-ui">
            <div id="l-up" class="energy-line" style="background:var(--danger); top:50%;"></div>
            <div id="l-down" class="energy-line" style="background:var(--accent); top:50%;"></div>
            <div id="h" class="handle" style="top:calc(50% - 25px); left:calc(50% - 25px);"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const stage = document.getElementById('stage');
    const handle = document.getElementById('h');
    let currentMode = 'kinetic';
    let time = 0;

    // 1. Fungsi Start yang membersihkan semua hambatan browser
    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        resize();
        window.requestAnimationFrame(update);
    }

    function resize() {
        canvas.width = stage.offsetWidth;
        canvas.height = stage.offsetHeight;
    }
    window.addEventListener('resize', resize);

    function setTab(mode, el) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('title').innerText = mode.toUpperCase();
        document.getElementById('kinetic-ui').style.display = (mode === 'kinetic') ? 'block' : 'none';
        document.getElementById('wave-ui').style.display = (mode === 'wave') ? 'block' : 'none';
        resize();
    }

    // 2. Loop Animasi Utama - Menggunakan Delta Time agar stabil
    function update(timestamp) {
        time = timestamp * 0.002; // Variabel waktu yang menggerakkan gelombang
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (currentMode === 'wave') {
            drawWaveAnimation();
        }
        
        window.requestAnimationFrame(update);
    }

    function drawWaveAnimation() {
        const mix = document.getElementById('mix').value / 100;
        const midY = canvas.height / 2;
        
        ctx.beginPath();
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 4;
        ctx.lineJoin = 'round';

        // Efek cahaya (Glow)
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';

        for (let i = 0; i < canvas.width; i += 2) {
            const x = i * 0.03;
            // Gelombang Dasar 1 & 2
            const w1 = Math.sin(x + time) * 60;
            const w2 = Math.sin(x * 1.6 + time) * 40;
            
            // Penggabungan (Superposisi)
            const y = midY + (w1 * (1 - mix)) + (w2 * mix);
            
            if (i === 0) ctx.moveTo(i, y);
            else ctx.lineTo(i, y);
        }
        
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // 3. Logic Drag & Touch (Fixed for Android)
    let dragging = false;
    const move = (e) => {
        if (!dragging || currentMode !== 'kinetic') return;
        const r = stage.getBoundingClientRect();
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        let y = Math.max(50, Math.min(r.height - 50, cy - r.top));
        
        handle.style.top = (y - 25) + 'px';
        const d = Math.abs(r.height / 2 - y);
        document.getElementById('l-up').style.top = (r.height/2 - d) + 'px';
        document.getElementById('l-down').style.top = (r.height/2 + d) + 'px';
        document.getElementById('val-a').innerText = (13.6 + d/8).toFixed(2);
        document.getElementById('val-b').innerText = (13.6 - d/8).toFixed(2);
    };

    handle.addEventListener('mousedown', () => dragging = true);
    handle.addEventListener('touchstart', (e) => { dragging = true; e.preventDefault(); }, {passive: false});
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('touchend', () => dragging = false);
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', move, {passive: false});

</script>
</body>
</html>
